name: Publish

on:
  workflow_dispatch:

env:
  version: 1.1.0

jobs:
  publish:
    name: Publish Container
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 17

      - uses: sbt/setup-sbt@v1

      - uses: coursier/cache-action@v6

      - name: Run tests
        run: sbt test scalafmtCheckAll

      - uses: VirtusLab/scala-cli-setup@v1

      - name: Build assembly JAR
        run: scala-cli --power package . --assembly -o capsule-mcp.jar

      - uses: docker/setup-qemu-action@v2
      - uses: docker/setup-buildx-action@v2

      - name: Authenticate with GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate images meta
        id: docker-meta-images
        uses: actions/github-script@v6
        with:
          script: |
            var images = [];
  
            images.push('ghcr.io/${{ github.repository }}');
  
            core.setOutput('images', images.join("\n"));
  
            var versions = [];
  
            versions.push('type=semver,pattern={{major}}.{{minor}},value=${{ env.version }}');
            versions.push('type=semver,pattern={{version}},value=${{ env.version }}');
      
            core.setOutput('tags', versions.join("\n"));

      - name: Configure Docker meta
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.docker-meta-images.outputs.images }}
          tags: |
            ${{ steps.docker-meta-images.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Capsule MCP Server
            org.opencontainers.image.description=MCP server that connects to your Capsule CRM data
            org.opencontainers.image.vendor=Zestia
            org.opencontainers.image.version=${{ env.version }}

      - name: Publish Container
        uses: docker/build-push-action@v5
        with:
          file: Dockerfile
          context: .
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true
          provenance: false
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}